# Cliente y dominio
fullnameOverride: ""
nameOverride: ""
image:
  repository: ghcr.io/green-llama/glerp-image
  tag: dev
  pullPolicy: Always
imagePullSecrets:
  - name: ghcr-cred

serviceAccount:
  create: true
  name: ciclo-sa
rbac:
  secretReader:
    enabled: true

# Puertos explícitos
nginx:
  service:
    type: ClusterIP
    port: 8080
  livenessProbe:
    tcpSocket: { port: 8080 }
  readinessProbe:
    tcpSocket: { port: 8080 }
  environment:
    UPSTREAM_REAL_IP_ADDRESS: "127.0.0.1"
    UPSTREAM_REAL_IP_RECURSIVE: "off"
    UPSTREAM_REAL_IP_HEADER: "X-Forwarded-For"
    FRAPPE_SITE_NAME_HEADER: "$host"
    PROXY_READ_TIMEOUT: "120"
    CLIENT_MAX_BODY_SIZE: "500m"

# DB/Cache
mariadb-sts:
  enabled: true
  rootPassword: changeit
  persistence:
    size: 8Gi
    storageClass: longhorn-crypto-mariadb-rwo
mariadb-subchart:
  enabled: false
mariadb:
  enabled: false
postgresql:
  enabled: false
postgresql-subchart:
  enabled: false
  image:
    repository: bitnamilegacy/postgresql
    tag: "14"

dragonfly-cache:
  enabled: true
dragonfly-queue:
  enabled: true
  storage:
    enabled: false
redis-cache:
  enabled: false
redis-queue:
  enabled: false
externalRedis:
  cache: ""
  queue: ""

persistence:
  worker:
    enabled: true
    size: 5Gi
    storageClass: longhorn-crypto-rwm
    accessModes: [ReadWriteMany]
  logs:
    enabled: false

jobs:
  configure:
    enabled: true
  createSite:
    enabled: true
    siteName: "ciclo.greenllama.tech"
    adminPassword: "changeit"
    dbType: mariadb
    installApps:
      - erpnext
      - payments
      - webshop
      - glerp_frappe_theme
      - erpnext_email_parser
      - glerp_branding
#      - hrms  -- Issues during install
      - dfp_external_storage
      - glerp_webtools
      - glerp_bigbulk_import
      - glerp_braintree_webhooks
      - glerp_audience
      - newsletter
      - blog
      - eps
      - offsite_backups
      - posawesome
      - glerp_ai_intake

ingress:
  enabled: false  # se usa IngressRoute extra abajo

socketio:
  service:
    port: 9000
  livenessProbe:
    tcpSocket:
      port: 9000
  readinessProbe:
    tcpSocket:
      port: 9000

worker:
  gunicorn:
    service:
      port: 8000
    livenessProbe:
      tcpSocket:
        port: 8000
    readinessProbe:
      tcpSocket:
        port: 8000
  healthProbe: |
    exec:
      command:
        - bash
        - -c
        - |-
          echo "Pinging backing services";
          {{- if (index .Values "mariadb-sts").enabled }}
          wait-for-it {{ include "erpnext.fullname" . }}-mariadb-sts:3306 -t 1;
          {{- else if (index .Values "postgresql-sts").enabled }}
          wait-for-it {{ include "erpnext.fullname" . }}-postgresql-sts:5432 -t 1;
          {{- else if or .Values.mariadb.enabled (get .Values "mariadb-subchart").enabled }}
          (
            wait-for-it {{ .Release.Name }}-mariadb-subchart:3306 -t 0 || \
            wait-for-it {{ .Release.Name }}-mariadb:3306 -t 0 || \
            wait-for-it {{ .Release.Name }}-mariadb-subchart-primary:3306 -t 0 || \
            wait-for-it {{ .Release.Name }}-mariadb-primary:3306 -t 1
          )
          {{- else if or .Values.postgresql.enabled (get .Values "postgresql-subchart").enabled }}
          (
            wait-for-it {{ .Release.Name }}-postgresql-subchart:5432 -t 0 || \
            wait-for-it {{ .Release.Name }}-postgresql:5432 -t 1
          )
          {{- else if or .Values.postgresql.enabled (index .Values "postgresql-subchart").enabled }}
          wait-for-it {{ .Release.Name }}-postgresql-subchart:5432 -t 1;
          {{- else if .Values.dbHost }}
          wait-for-it {{ .Values.dbHost }}:{{ .Values.dbPort }} -t 1;
          {{- end }}
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 5

# Ensure Bitnami redis/postgresql subcharts stay disabled (we use dragonfly + mariadb-sts)

extraObjects:
  # Namespace + SA + RBAC
  - apiVersion: v1
    kind: Namespace
    metadata:
      name: ciclo
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: ciclo-sa
      namespace: ciclo
      labels: { app: glerp }
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      name: secret-reader
      namespace: ciclo
    rules:
      - apiGroups: [""]
        resources: ["secrets"]
        verbs: ["get", "list", "watch"]
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: secret-reader-binding
      namespace: ciclo
    subjects:
      - kind: ServiceAccount
        name: ciclo-sa
        namespace: ciclo
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: secret-reader

  # CA trust via ESO (certs ya en Vault backend)
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: apps-ca-trust
      namespace: ciclo
      finalizers:
        - externalsecrets.external-secrets.io/externalsecret-cleanup
    spec:
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: kubernetes-token-auth
      data:
        - secretKey: root_ca
          remoteRef:
            key: root-ca-secret
            property: tls.crt
        - secretKey: intermediate_ca
          remoteRef:
            key: apps-int-ca-secret
            property: tls.crt
      target:
        name: apps-ca-trust
        creationPolicy: Owner
        deletionPolicy: Retain
        template:
          engineVersion: v2
          data:
            ca.crt: |
              {{ .root_ca }}
              {{ .intermediate_ca }}
            intermediate.crt: |
              {{ .intermediate_ca }}
            root.crt: |
              {{ .root_ca }}

  # Leaf cert para apps del namespace
  - apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: ciclo-leaf-cert
      namespace: ciclo
    spec:
      secretName: ciclo-leaf-cert
      dnsNames:
        - "*.ciclo.svc"
        - "*.ciclo.svc.cluster.local"
        - "*.greenllama.tech"
      ipAddresses: [127.0.0.1, "::1"]
      duration: 2160h
      renewBefore: 360h
      issuerRef:
        kind: ClusterIssuer
        name: apps-general-signer
        group: cert-manager.io

  # ExternalSecret para credenciales de MinIO
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: ciclo-minio-creds
      namespace: ciclo
    spec:
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: vault-backend
      target:
        name: ciclo-minio-creds
        creationPolicy: Owner
        template:
          engineVersion: v2
          data:
            accesskey: "{{ .accesskey }}"
            secretkey: "{{ .secretkey }}"
            config.env: |
              export MINIO_ROOT_USER="{{ .accesskey }}"
              export MINIO_ROOT_PASSWORD="{{ .secretkey }}"
      data:
        - secretKey: accesskey
          remoteRef:
            key: secret/data/greenllama/minio-creds
            property: accesskey
        - secretKey: secretkey
          remoteRef:
            key: secret/data/greenllama/minio-creds
            property: secretkey

  # MinIO Tenant (usa secret de vault vía ESO)
  - apiVersion: minio.min.io/v2
    kind: Tenant
    metadata:
      name: ciclo-minio-tenant
      namespace: ciclo
    spec:
      buckets:
        - name: ciclo
          objectLock: false
          region: us-east-1
      mountPath: /export
      configuration:
        name: ciclo-minio-creds
      env:
        - name: MINIO_SERVER_URL
          value: https://minio-ciclo.greenllama.tech
        - name: MINIO_BROWSER_REDIRECT_URL
          value: https://minio-ciclo.greenllama.tech
        - name: MINIO_KMS_VAULT_ENABLE
          value: "on"
        - name: MINIO_KMS_VAULT_ENDPOINT
          value: "http://vault-active.vault-system.svc.cluster.local:8200"
        - name: MINIO_KMS_VAULT_AUTH_TYPE
          value: "jwt"
        - name: MINIO_KMS_VAULT_ROLE
          value: "ciclo-role"
        - name: MINIO_KMS_VAULT_KEY_NAME
          value: "minio-key"
        - name: MINIO_KMS_VAULT_JWT_PATH
          value: "/var/run/secrets/kubernetes.io/serviceaccount/token"
      pools:
        - name: pool-0
          servers: 2
          volumesPerServer: 2
          volumeClaimTemplate:
            metadata: { name: data }
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: directpv-min-io
              resources: { requests: { storage: 512Mi } }
          containerSecurityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          securityContext:
            fsGroup: 1000
        - name: pool-1
          servers: 2
          volumesPerServer: 2
          volumeClaimTemplate:
            metadata: { name: data }
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: directpv-min-io
              resources: { requests: { storage: 512Mi } }
          containerSecurityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          securityContext:
            fsGroup: 1000
      poolsMetadata:
        annotations:
          sidecar.istio.io/inject: "true"
          traffic.sidecar.istio.io/includeInboundPorts: "10443"
          traffic.sidecar.istio.io/includeOutboundPorts: "8200"
          traffic.sidecar.istio.io/excludeInboundPorts: "9000, 9090"
          traffic.sidecar.istio.io/excludeOutboundPorts: "9000, 9090"
      requestAutoCert: false
      prometheusOperator: false
      features:
        bucketDNS: false
        enableSFTP: false
      podManagementPolicy: Parallel
      subPath: /data
      serviceAccountName: ciclo-sa

  # IngressRoute para MinIO (Traefik)
  - apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: minio-ciclo
      namespace: ciclo
      annotations:
        kubernetes.io/ingress.class: traefik
    spec:
      entryPoints: [websecure]
      tls:
        secretName: letsencrypt-greenllama-tech-tls
      routes:
        - match: Host(`minio-ciclo.greenllama.tech`) && PathPrefix(`/`)
          kind: Rule
          services:
            - name: minio
              port: 80

  # IngressRoute para GLerp (UI)
  - apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: ciclo
      namespace: traefik-system
      annotations:
        kubernetes.io/ingress.class: traefik
    spec:
      entryPoints: [websecure]
      tls:
        secretName: letsencrypt-greenllama-tech-tls
      routes:
        - match: Host(`ciclo.greenllama.tech`) && PathPrefix(`/`)
          kind: Rule
          services:
            - name: glerp
              namespace: ciclo
              port: 8080
              scheme: http
