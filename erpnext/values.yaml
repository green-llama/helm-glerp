mariadb:
  enabled: false
mariadb-sts:
  enabled: true
  image:
    pullPolicy: IfNotPresent
    repository: mariadb
    tag: '10.6'
  myCnf: |
    [mysqld]
    # Character Set - Required for GLerp compatibility
    skip-character-set-client-handshake
    skip-innodb-read-only-compressed
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci

    # Memory Architecture: Focused on RAM-Residency
    # 2GB allows 160k+ items & 1 year of GL entries to live in memory
    innodb_buffer_pool_size = 2G
    innodb_buffer_pool_instances = 2

    # Transaction Log: High-volume write optimization
    innodb_log_file_size = 512M
    innodb_flush_log_at_trx_commit = 2

    # Connection Management: Prevents "Connection Exhaustion" errors
    max_connections = 100
    tmp_table_size = 64M
    max_heap_table_size = 64M
  persistence:
    size: 8Gi
    storageClass: longhorn-crypto-mariadb-rwo
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
#  rootPassword: changeit  # Used only when existingSecret.name is not set
  existingSecret:  #RJB update Feb23: use a K8 secret instead of hard coding in chart. existingSecret takes precedence over rootPassword.
    name: "{{helmVar_TENANT_NAMESPACE}}-mariadb-root"
    key: "mariadb-root-password"
mariadb-subchart:
  enabled: false
  image:
    repository: bitnamilegacy/mariadb
