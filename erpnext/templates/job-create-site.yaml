{{- if .Values.jobs.createSite.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  {{- if .Values.jobs.createSite.jobName }}
  name: {{ .Values.jobs.createSite.jobName }}
  {{- else }}
  name: {{ template "erpnext.fullname" . }}-new-site-{{ now | date "20060102150405" }}
  {{- end }}
  labels:
    {{- include "erpnext.labels" . | nindent 4 }}
  annotations:
{{- with .Values.jobs.createSite.annotations }}
{{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
{{- end }}
{{- end }}
spec:
  backoffLimit: {{ .Values.jobs.createSite.backoffLimit }}
  template:
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ template "erpnext.serviceAccountName" $ }}
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: validate-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bash", "-c"]
          args:
            - |
              set -e
              mkdir -p sites
              [[ -f sites/common_site_config.json ]] || echo "{}" > sites/common_site_config.json
              python - <<'PY'
              import json, os, pathlib
              p = pathlib.Path("sites/common_site_config.json")
              cfg = json.loads(p.read_text() or "{}")
              cfg.setdefault("db_host", os.environ["DB_HOST"])
              cfg.setdefault("db_port", int(os.environ["DB_PORT"]))
              cfg.setdefault("redis_cache", os.environ["REDIS_CACHE"])
              cfg.setdefault("redis_queue", os.environ["REDIS_QUEUE"])
              cfg.setdefault("redis_socketio", os.environ["REDIS_QUEUE"])
              p.write_text(json.dumps(cfg, indent=2))
              print("common_site_config.json ensured with db/redis settings")
              PY
              echo "Waiting for database to be reachable..."
              wait-for-it -t 180 ${DB_HOST}:${DB_PORT}
              echo "Database is reachable."
          env:
            - name: "DB_HOST"
              {{- if or .Values.mariadb.enabled (get .Values "mariadb-subchart").enabled }}
              value: {{ .Release.Name }}-mariadb-subchart
              {{- else if or .Values.postgresql.enabled (get .Values "postgresql-subchart").enabled }}
              value: {{ .Release.Name }}-postgresql-subchart
              {{- else if (get .Values "mariadb-sts").enabled }}
              value: {{ include "erpnext.fullname" . }}-mariadb-sts
              {{- else if (get .Values "postgresql-sts").enabled }}
              value: {{ include "erpnext.fullname" . }}-postgresql-sts
              {{- else }}
              value: "{{ .Values.dbHost }}"
              {{- end }}
            - name: "DB_PORT"
              {{- if or .Values.mariadb.enabled (get .Values "mariadb-subchart").enabled }}
              value: "3306"
              {{- else if or .Values.postgresql.enabled (get .Values "postgresql-subchart").enabled }}
              value: "5432"
              {{- else if .Values.dbPort }}
              value: {{ .Values.dbPort | quote }}
              {{- else if eq .Values.jobs.createSite.dbType "mariadb" }}
              value: "3306"
              {{- else if eq .Values.jobs.createSite.dbType "postgres" }}
              value: "5432"
              {{- end }}
            - name: "REDIS_CACHE"
              {{- if .Values.externalRedis.cache }}
              value: {{ .Values.externalRedis.cache | quote }}
              {{- else if (get .Values "dragonfly-cache").enabled }}
              value: redis://{{ .Release.Name }}-dragonfly-cache:6379
              {{- else if (get .Values "redis-cache").enabled }}
              value: redis://{{ .Release.Name }}-redis-cache-master:6379
              {{- else }}
              value: ""
              {{- end }}
            - name: "REDIS_QUEUE"
              {{- if .Values.externalRedis.queue }}
              value: {{ .Values.externalRedis.queue | quote }}
              {{- else if (get .Values "dragonfly-queue").enabled }}
              value: redis://{{ .Release.Name }}-dragonfly-queue:6379
              {{- else if (get .Values "redis-queue").enabled }}
              value: redis://{{ .Release.Name }}-redis-queue-master:6379
              {{- else }}
              value: ""
              {{- end }}
          resources:
            {{- toYaml .Values.jobs.createSite.resources | nindent 12 }}
          securityContext:
            {{- toYaml $.Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: sites-dir
              mountPath: /home/frappe/frappe-bench/sites
      containers:
      - name: create-site
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["bash", "-c"]
        args:
          - |-
            set -x;
            {{- if .Values.jobs.createSite.upgradeAppsOnExistingSite }}
            set -euo pipefail;

            if bench --site "${SITE_NAME}" list-apps > /tmp/installed_apps.txt 2>/dev/null; then
                echo "Site ${SITE_NAME} already exists, skipping new-site";
            else
                echo "Site ${SITE_NAME} not found, creating site";
                bench new-site ${SITE_NAME} \
                  --no-mariadb-socket \
                  --db-type=${DB_TYPE} \
                  --db-host=${DB_HOST} \
                  --db-port=${DB_PORT} \
                  --admin-password=${ADMIN_PASSWORD} \
                  --mariadb-root-username=${DB_ROOT_USER} \
                  --mariadb-root-password=${DB_ROOT_PASSWORD} \
                {{- if .Values.jobs.createSite.forceCreate }}
                  --force \
                {{- end }}
                ;
                bench --site "${SITE_NAME}" list-apps > /tmp/installed_apps.txt
            fi

            {{- if .Values.jobs.createSite.installApps }}
            apps=(
              {{- range .Values.jobs.createSite.installApps }}
              "{{ . }}"
              {{- end }}
            )
            for app in "${apps[@]}"; do
                if grep -Fxq "${app}" /tmp/installed_apps.txt; then
                    echo "App already installed: ${app}";
                else
                    echo "Installing app: ${app}";
                    bench --site "${SITE_NAME}" install-app "${app}";
                    echo "${app}" >> /tmp/installed_apps.txt;
                fi
            done
            {{- end }}

            {{- if .Values.jobs.createSite.migrateAfterAppSync }}
            echo "Running migrate after app sync";
            bench --site "${SITE_NAME}" migrate;
            {{- end }}
            {{- else }}

            bench_output=$(bench new-site ${SITE_NAME} \
              --no-mariadb-socket \
              --db-type=${DB_TYPE} \
              --db-host=${DB_HOST} \
              --db-port=${DB_PORT} \
              --admin-password=${ADMIN_PASSWORD} \
              --mariadb-root-username=${DB_ROOT_USER} \
              --mariadb-root-password=${DB_ROOT_PASSWORD} \
            {{- if .Values.jobs.createSite.installApps }}
              {{- range .Values.jobs.createSite.installApps }}
              --install-app={{ . }} \
              {{- end }}
            {{- end }}
            {{- if .Values.jobs.createSite.forceCreate }}
              --force \
            {{- end }}
             | tee /dev/stderr);

            bench_exit_status=$?;

            if [ $bench_exit_status -ne 0 ]; then
                # Don't consider the case "site already exists" an error.
                if [[ $bench_output == *"already exists"* ]]; then
                    echo "Site already exists, continuing...";
                else
                    echo "An error occurred in bench new-site: $bench_output"
                    exit $bench_exit_status;
                fi
            fi

            set -e;
            {{- end }}

            rm -f currentsite.txt /tmp/installed_apps.txt
        env:
          - name: "SITE_NAME"
            value: "{{ .Values.jobs.createSite.siteName }}"
          - name: "DB_TYPE"
            value: {{ .Values.jobs.createSite.dbType }}
          - name: DB_HOST
            {{- if or .Values.mariadb.enabled (get .Values "mariadb-subchart").enabled }}
            value: {{ .Release.Name }}-mariadb-subchart
            {{- else if or .Values.postgresql.enabled (get .Values "postgresql-subchart").enabled }}
            value: {{ .Release.Name }}-postgresql-subchart
            {{- else if (get .Values "mariadb-sts").enabled }}
            value: {{ include "erpnext.fullname" . }}-mariadb-sts
            {{- else if (get .Values "postgresql-sts").enabled }}
            value: {{ include "erpnext.fullname" . }}-postgresql-sts
            {{- else }}
            value: "{{ .Values.dbHost }}"
            {{- end }}
          - name: "DB_PORT"
            {{- if or .Values.mariadb.enabled (get .Values "mariadb-subchart").enabled }}
            value: "3306"
            {{- else if or .Values.postgresql.enabled (get .Values "postgresql-subchart").enabled }}
            value: "5432"
            {{- else if .Values.dbPort }}
            value: {{ .Values.dbPort | quote }}
            {{- else if eq .Values.jobs.createSite.dbType "mariadb" }}
            value: "3306"
            {{- else if eq .Values.jobs.createSite.dbType "postgresql" }}
            value: "5432"
            {{- end }}
          - name: "DB_ROOT_USER"
            {{- if or .Values.mariadb.enabled (get .Values "mariadb-subchart").enabled }}
            value: "root"
            {{- else if (get .Values "mariadb-sts").enabled }}
            value: "root"
            {{- else if or .Values.postgresql.enabled (get .Values "postgresql-subchart").enabled }}
            value: "postgres"
            {{- else }}
            value: "{{ .Values.dbRootUser }}"
            {{- end }}
          - name: "DB_ROOT_PASSWORD"
            {{- if (get .Values "mariadb-sts").enabled }}
            valueFrom:
              secretKeyRef:
                key: {{ include "glerp.mariadbRootSecretKey" . | quote }}
                name: {{ include "glerp.mariadbRootSecretName" . | quote }}
            {{- else if (index .Values "postgresql-sts").enabled }}
            valueFrom:
              secretKeyRef:
                key: postgresql-password
                name: {{ template "erpnext.fullname" . }}
            {{- else if or .Values.mariadb.enabled (get .Values "mariadb-subchart").enabled }}
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-mariadb-subchart
                key: mariadb-root-password
            {{- else if or .Values.postgresql.enabled (get .Values "postgresql-subchart").enabled }}
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-postgresql-subchart
                key: postgres-password
            {{- else if .Values.dbExistingSecret }}
            valueFrom:
              secretKeyRef:
                key: {{ .Values.dbExistingSecretPasswordKey }}
                name: {{ .Values.dbExistingSecret }}
            {{- else if .Values.dbRootPassword }}
            valueFrom:
              secretKeyRef:
                key: db-root-password
                name: {{ template "erpnext.fullname" . }}
            {{- end }}
          - name: "ADMIN_PASSWORD"
            {{- if .Values.jobs.createSite.adminExistingSecret }}
            valueFrom:
              secretKeyRef:
                key: {{ .Values.jobs.createSite.adminExistingSecretKey }}
                name: {{ .Values.jobs.createSite.adminExistingSecret }}
            {{- else}}
            value: "{{ .Values.jobs.createSite.adminPassword }}"
            {{- end }}
        resources:
          {{- toYaml .Values.jobs.createSite.resources | nindent 10 }}
        securityContext:
          {{- toYaml $.Values.securityContext | nindent 10 }}
        volumeMounts:
          - name: sites-dir
            mountPath: /home/frappe/frappe-bench/sites
          - name: logs
            mountPath: /home/frappe/frappe-bench/logs
      restartPolicy: Never
      volumes:
        - name: sites-dir
          {{- if .Values.persistence.worker.enabled }}
          persistentVolumeClaim:
            {{- if .Values.persistence.worker.existingClaim }}
            claimName: {{ .Values.persistence.worker.existingClaim }}
            {{- else }}
            claimName: {{ template "erpnext.fullname" . }}
            {{- end }}
            readOnly: false
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: logs
          {{- if .Values.persistence.logs.enabled }}
          persistentVolumeClaim:
            {{- if .Values.persistence.logs.existingClaim }}
            claimName: {{ .Values.persistence.logs.existingClaim }}
            {{- else }}
            claimName: {{ template "erpnext.fullname" . }}-logs
            {{- end }}
            readOnly: false
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.jobs.createSite.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.jobs.createSite.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.jobs.createSite.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
